services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${APP_IMAGE:?APP_IMAGE must be set}
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health/', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    command: ["/bin/sh", "/opt/nginx/reload-nginx.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/reload-nginx.sh:/opt/nginx/reload-nginx.sh:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  certbot:
    image: certbot/certbot:v2.11.0
    entrypoint: ["/bin/sh", "/opt/certbot/renew-certificates.sh"]
    volumes:
      - ./deploy/certbot/renew-certificates.sh:/opt/certbot/renew-certificates.sh:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  letsencrypt:
  certbot-webroot:

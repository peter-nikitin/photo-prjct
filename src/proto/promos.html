<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PicFlow Promos</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="./data.js" defer></script>
    <script src="./promos.js" defer></script>
  </head>
  <body>
    <div class="app-shell admin-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="PicFlow">
          <span class="brand-mark">PF</span>
          <span>
            <strong>PicFlow</strong>
            <small>promos</small>
          </span>
        </a>

        <nav class="admin-nav" aria-label="Разделы">
          <a class="event-tab" href="./index.html">Витрина</a>
          <a class="event-tab" href="./admin.html">Админ панель</a>
          <a class="event-tab" href="./events.html">События</a>
          <a class="event-tab" href="./upload.html">Загрузчик</a>
          <a class="event-tab" href="./orders.html">Заказы</a>
          <a class="event-tab active" href="./promos.html">Промокоды</a>
          <a class="event-tab" href="./purchased.html">Купленные</a>
        </nav>
      </header>

      <main class="events-workspace">
        <section class="events-board">
          <div class="admin-toolbar">
            <div>
              <h1>Промокоды</h1>
              <p id="promosSummary">0 промокодов</p>
            </div>
            <button class="primary-button compact-action" id="newPromoButton" type="button">
              <i data-lucide="plus"></i>
              Новый код
            </button>
          </div>

          <div class="input-shell admin-search">
            <i data-lucide="search"></i>
            <input id="promosSearch" type="search" placeholder="Название или код" autocomplete="off" />
          </div>

          <div class="events-list" id="promosList" aria-live="polite"></div>
        </section>

        <aside class="event-editor">
          <div class="panel-heading">
            <span>Промокод</span>
            <span class="pill" id="promoMode">Edit</span>
          </div>

          <form id="promoForm" class="photo-form">
            <label class="field">
              <span>Название</span>
              <input id="promoName" required placeholder="Партнеры" />
            </label>
            <label class="field">
              <span>Код</span>
              <input id="promoCodeEdit" required placeholder="PARTNER2026" />
            </label>
            <div class="form-grid">
              <label class="field">
                <span>Тип скидки</span>
                <select id="promoType">
                  <option value="percent">Процент</option>
                  <option value="fixed">Сумма</option>
                  <option value="free_photo">Бесплатное фото</option>
                  <option value="free_pack">Бесплатный пакет</option>
                  <option value="photo_quantity_discount">N фото со скидкой</option>
                </select>
              </label>
              <label class="field">
                <span>Размер скидки</span>
                <input id="promoValue" type="number" min="0" step="1" />
              </label>
            </div>
            <label class="field">
              <span>Количество фото со скидкой</span>
              <input id="promoPhotoLimit" type="number" min="1" step="1" placeholder="Например 3" />
            </label>
            <div class="form-grid">
              <label class="field">
                <span>Начало</span>
                <input id="promoStarts" type="date" />
              </label>
              <label class="field">
                <span>Окончание</span>
                <input id="promoEnds" type="date" />
              </label>
            </div>
            <label class="field">
              <span>Лимит использований</span>
              <input id="promoLimit" type="number" min="0" step="1" placeholder="0 = без лимита" />
            </label>
            <label class="field">
              <span>Мероприятия</span>
              <input id="promoEvents" placeholder="London 10K, Expo Run или пусто для всего сайта" />
            </label>
            <label class="check-row">
              <input id="promoActive" type="checkbox" />
              <span>Промокод активен</span>
            </label>

            <div class="admin-actions two-actions">
              <button class="primary-button" type="submit">
                <i data-lucide="save"></i>
                Сохранить
              </button>
              <button class="danger-button" id="deletePromoButton" type="button">
                <i data-lucide="trash-2"></i>
                Удалить
              </button>
            </div>
          </form>
        </aside>
      </main>

      <div class="toast" id="promosToast" role="status" aria-live="polite" hidden></div>
    </div>
  </body>
</html>

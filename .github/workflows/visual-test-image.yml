name: Publish visual test image

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/visual-test-image.yml
      - Dockerfile.visual-tests
      - package-lock.json
      - src/backend/requirements.txt
  workflow_dispatch:

jobs:
  build:
    name: Build visual test image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select visual test image reference
        id: image
        run: |
          dependency_key=$(
            {
              git hash-object Dockerfile.visual-tests
              git hash-object package-lock.json
              git hash-object src/backend/requirements.txt
            } | git hash-object --stdin
          )
          echo "image=ghcr.io/${GITHUB_REPOSITORY}-visual-tests:${dependency_key}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish visual test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.visual-tests
          push: true
          tags: ${{ steps.image.outputs.image }}

name: Promote production

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: Commit SHA successfully deployed to staging
        required: true
        type: string

jobs:
  verify-staging:
    name: Verify staging image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Confirm image was deployed successfully to staging
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ghcr.io/${{ github.repository }}:${{ inputs.image_sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: APP_IMAGE
          script_stop: true
          script: test "$(cat /opt/photo-prjct/deployed-image)" = "$APP_IMAGE"

  promote:
    name: Promote verified image
    runs-on: ubuntu-latest
    needs: verify-staging
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.image_sha }}
      - name: Copy production deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.prod.yml,docker-compose.production.yml,deploy
          target: /opt/photo-prjct/
      - name: Apply production deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ghcr.io/${{ github.repository }}:${{ inputs.image_sha }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PUBLIC_DOMAIN: ${{ vars.PUBLIC_DOMAIN }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          MEDIA_STORAGE_BACKEND: ${{ vars.MEDIA_STORAGE_BACKEND || 'filesystem' }}
          MEDIA_S3_ENDPOINT_URL: ${{ vars.MEDIA_S3_ENDPOINT_URL || 'https://storage.yandexcloud.net' }}
          MEDIA_S3_REGION: ${{ vars.MEDIA_S3_REGION || 'ru-central1' }}
          MEDIA_S3_PUBLIC_BUCKET: ${{ vars.MEDIA_S3_PUBLIC_BUCKET }}
          MEDIA_S3_ACCESS_KEY_ID: ${{ secrets.MEDIA_S3_ACCESS_KEY_ID }}
          MEDIA_S3_SECRET_ACCESS_KEY: ${{ secrets.MEDIA_S3_SECRET_ACCESS_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          envs: APP_IMAGE,SECRET_KEY,DEBUG,ALLOWED_HOSTS,DB_NAME,DB_USER,DB_PASSWORD,PUBLIC_DOMAIN,LETSENCRYPT_EMAIL,MEDIA_STORAGE_BACKEND,MEDIA_S3_ENDPOINT_URL,MEDIA_S3_REGION,MEDIA_S3_PUBLIC_BUCKET,MEDIA_S3_ACCESS_KEY_ID,MEDIA_S3_SECRET_ACCESS_KEY,GHCR_USERNAME,GHCR_READ_TOKEN
          script: DEPLOYMENT_TARGET=production DEPLOY_ROOT=/opt/photo-prjct COMPOSE_PROJECT_NAME=photo-prjct-production sh /opt/photo-prjct/deploy/apply-deployment.sh

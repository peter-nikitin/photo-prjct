<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PicFlow Orders</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="./data.js" defer></script>
    <script src="./orders.js" defer></script>
  </head>
  <body>
    <div class="app-shell admin-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="PicFlow">
          <span class="brand-mark">PF</span>
          <span>
            <strong>PicFlow</strong>
            <small>orders</small>
          </span>
        </a>

        <nav class="admin-nav" aria-label="Разделы">
          <a class="event-tab" href="./index.html">Витрина</a>
          <a class="event-tab" href="./admin.html">Админ панель</a>
          <a class="event-tab" href="./events.html">События</a>
          <a class="event-tab" href="./upload.html">Загрузчик</a>
          <a class="event-tab active" href="./orders.html">Заказы</a>
          <a class="event-tab" href="./promos.html">Промокоды</a>
          <a class="event-tab" href="./purchased.html">Купленные</a>
        </nav>

        <div class="top-actions" aria-label="Действия">
          <button class="icon-button" id="exportOrdersButton" type="button" title="Экспорт заказов">
            <i data-lucide="download"></i>
          </button>
        </div>
      </header>

      <main class="orders-workspace">
        <section class="orders-board" aria-label="Все заказы">
          <div class="admin-toolbar">
            <div>
              <button class="ghost-button back-events" id="ordersBackEvents" type="button" hidden>
                <i data-lucide="arrow-left"></i>
                Все события
              </button>
              <h1 id="ordersTitle">События</h1>
              <p id="ordersSummary">0 заказов</p>
            </div>
            <button class="secondary-button compact-action" id="seedOrdersButton" type="button">
              <i data-lucide="refresh-ccw"></i>
              Демо-заказы
            </button>
          </div>

          <div class="order-metrics" aria-label="Сводка заказов">
            <div class="metric">
              <span id="ordersCount">0</span>
              <small>заказов</small>
            </div>
            <div class="metric">
              <span id="ordersRevenue">0 ₽</span>
              <small>сумма</small>
            </div>
            <div class="metric">
              <span id="ordersAverage">0 ₽</span>
              <small>средний чек</small>
            </div>
          </div>

          <div class="orders-filters">
            <div class="input-shell">
              <i data-lucide="search"></i>
              <input id="ordersSearch" type="search" placeholder="Номер заказа, клиент или фото" autocomplete="off" />
            </div>
            <select id="ordersStatus">
              <option value="all">Все статусы</option>
              <option value="new">Новый</option>
              <option value="paid">Оплачен</option>
              <option value="processing">В работе</option>
              <option value="completed">Готов</option>
              <option value="cancelled">Отменён</option>
            </select>
          </div>

          <div class="orders-table" id="ordersTable" aria-live="polite"></div>
        </section>

        <aside class="order-detail" aria-label="Детали заказа">
          <div class="panel-heading">
            <span>Детали</span>
            <span class="pill" id="detailStatus">-</span>
          </div>
          <div id="orderDetailBody" class="order-detail-body"></div>
        </aside>
      </main>

      <div class="toast" id="ordersToast" role="status" aria-live="polite" hidden></div>
    </div>
  </body>
</html>

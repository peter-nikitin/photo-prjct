name: Deploy staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      verify_private_storage:
        description: Run the confirmed real-storage contract probe after disabled deployment
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: Build immutable image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      app_image: ${{ steps.image.outputs.app_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Select image reference
        id: image
        run: echo "app_image=ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.app_image }}

  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Copy staging deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.prod.yml,docker-compose.https.yml,deploy
          target: /opt/photo-prjct/
      - name: Apply staging deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ needs.build.outputs.app_image }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PUBLIC_DOMAIN: ${{ vars.PUBLIC_DOMAIN }}
          PUBLIC_DOMAIN_ALIAS: ${{ vars.PUBLIC_DOMAIN_ALIAS }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          MEDIA_STORAGE_BACKEND: ${{ vars.MEDIA_STORAGE_BACKEND || 'filesystem' }}
          MEDIA_S3_ENDPOINT_URL: ${{ vars.MEDIA_S3_ENDPOINT_URL || 'https://storage.yandexcloud.net' }}
          MEDIA_S3_REGION: ${{ vars.MEDIA_S3_REGION || 'ru-central1' }}
          MEDIA_S3_PUBLIC_BUCKET: ${{ vars.MEDIA_S3_PUBLIC_BUCKET }}
          MEDIA_S3_ACCESS_KEY_ID: ${{ secrets.MEDIA_S3_ACCESS_KEY_ID }}
          MEDIA_S3_SECRET_ACCESS_KEY: ${{ secrets.MEDIA_S3_SECRET_ACCESS_KEY }}
          PHOTO_UPLOAD_ENABLED: ${{ vars.PHOTO_UPLOAD_ENABLED || 'False' }}
          PRIVATE_MEDIA_S3_BUCKET: ${{ vars.PRIVATE_MEDIA_S3_BUCKET }}
          PRIVATE_MEDIA_S3_ACCESS_KEY_ID: ${{ secrets.PRIVATE_MEDIA_S3_ACCESS_KEY_ID }}
          PRIVATE_MEDIA_S3_SECRET_ACCESS_KEY: ${{ secrets.PRIVATE_MEDIA_S3_SECRET_ACCESS_KEY }}
          PRIVATE_MEDIA_ALLOWED_ORIGINS: ${{ vars.PRIVATE_MEDIA_ALLOWED_ORIGINS }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          envs: APP_IMAGE,SECRET_KEY,DEBUG,ALLOWED_HOSTS,DB_NAME,DB_USER,DB_PASSWORD,PUBLIC_DOMAIN,PUBLIC_DOMAIN_ALIAS,LETSENCRYPT_EMAIL,MEDIA_STORAGE_BACKEND,MEDIA_S3_ENDPOINT_URL,MEDIA_S3_REGION,MEDIA_S3_PUBLIC_BUCKET,MEDIA_S3_ACCESS_KEY_ID,MEDIA_S3_SECRET_ACCESS_KEY,PHOTO_UPLOAD_ENABLED,PRIVATE_MEDIA_S3_BUCKET,PRIVATE_MEDIA_S3_ACCESS_KEY_ID,PRIVATE_MEDIA_S3_SECRET_ACCESS_KEY,PRIVATE_MEDIA_ALLOWED_ORIGINS,GHCR_USERNAME,GHCR_READ_TOKEN
          script: DEPLOYMENT_TARGET=staging DEPLOY_ROOT=/opt/photo-prjct COMPOSE_PROJECT_NAME=photo-prjct-staging sh /opt/photo-prjct/deploy/apply-deployment.sh
      - name: Verify private upload storage contract
        if: ${{ inputs.verify_private_storage }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          PRIVATE_MEDIA_ALLOWED_ORIGINS: ${{ vars.PRIVATE_MEDIA_ALLOWED_ORIGINS }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: PRIVATE_MEDIA_ALLOWED_ORIGINS
          script_stop: true
          script: |
            cd /opt/photo-prjct
            docker compose --project-name photo-prjct-staging \
              --env-file .env \
              -f docker-compose.prod.yml \
              -f docker-compose.https.yml \
              exec -T -e PHOTO_UPLOAD_ENABLED=True web \
              sh -lc 'python manage.py verify_private_upload_storage --confirm-real-storage --origin "$PRIVATE_MEDIA_ALLOWED_ORIGINS"'

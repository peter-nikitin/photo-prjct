name: Promote production

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: Commit SHA successfully deployed to staging
        required: true
        type: string

jobs:
  verify-staging:
    name: Verify staging image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Confirm image was deployed successfully to staging
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ghcr.io/${{ github.repository }}:${{ inputs.image_sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: APP_IMAGE
          script_stop: true
          script: test "$(cat /opt/photo-prjct/deployed-image)" = "$APP_IMAGE"

  promote:
    name: Promote verified image
    runs-on: ubuntu-latest
    needs: verify-staging
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.image_sha }}

      - name: Copy compose file to production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.prod.yml,deploy
          target: /opt/photo-prjct/

      - name: Apply production deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ghcr.io/${{ github.repository }}:${{ inputs.image_sha }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PUBLIC_DOMAIN: ${{ vars.PUBLIC_DOMAIN }}
          ENABLE_HTTPS: ${{ vars.ENABLE_HTTPS || 'true' }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          MEDIA_STORAGE_BACKEND: ${{ vars.MEDIA_STORAGE_BACKEND || 'filesystem' }}
          MEDIA_S3_ENDPOINT_URL: ${{ vars.MEDIA_S3_ENDPOINT_URL || 'https://storage.yandexcloud.net' }}
          MEDIA_S3_REGION: ${{ vars.MEDIA_S3_REGION || 'ru-central1' }}
          MEDIA_S3_PUBLIC_BUCKET: ${{ vars.MEDIA_S3_PUBLIC_BUCKET }}
          MEDIA_S3_ACCESS_KEY_ID: ${{ secrets.MEDIA_S3_ACCESS_KEY_ID }}
          MEDIA_S3_SECRET_ACCESS_KEY: ${{ secrets.MEDIA_S3_SECRET_ACCESS_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          envs: APP_IMAGE,SECRET_KEY,DEBUG,ALLOWED_HOSTS,DB_NAME,DB_USER,DB_PASSWORD,PUBLIC_DOMAIN,ENABLE_HTTPS,LETSENCRYPT_EMAIL,MEDIA_STORAGE_BACKEND,MEDIA_S3_ENDPOINT_URL,MEDIA_S3_REGION,MEDIA_S3_PUBLIC_BUCKET,MEDIA_S3_ACCESS_KEY_ID,MEDIA_S3_SECRET_ACCESS_KEY,GHCR_USERNAME,GHCR_READ_TOKEN
          script: |
            set -eu
            install -d -m 0755 /opt/photo-prjct
            : "${PUBLIC_DOMAIN:?Set production variable PUBLIC_DOMAIN}"
            ALLOWED_HOSTS="${ALLOWED_HOSTS:+$ALLOWED_HOSTS,}$PUBLIC_DOMAIN"
            if [ "$ENABLE_HTTPS" != "true" ] && [ "$ENABLE_HTTPS" != "false" ]; then
              echo "ENABLE_HTTPS must be true or false" >&2
              exit 1
            fi
            if [ "$ENABLE_HTTPS" = "true" ]; then
              : "${LETSENCRYPT_EMAIL:?Set production secret LETSENCRYPT_EMAIL}"
            fi

            if [ -f /opt/photo-prjct/deployed-image ]; then
              cp /opt/photo-prjct/deployed-image /opt/photo-prjct/previous-image
            fi

            umask 077
            cat > /opt/photo-prjct/.env <<EOF
            APP_IMAGE=$APP_IMAGE
            SECRET_KEY=$SECRET_KEY
            DEBUG=$DEBUG
            ALLOWED_HOSTS=$ALLOWED_HOSTS
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_HOST=db
            DB_PORT=5432
            PUBLIC_DOMAIN=$PUBLIC_DOMAIN
            ENABLE_HTTPS=$ENABLE_HTTPS
            MEDIA_STORAGE_BACKEND=$MEDIA_STORAGE_BACKEND
            MEDIA_S3_ENDPOINT_URL=$MEDIA_S3_ENDPOINT_URL
            MEDIA_S3_REGION=$MEDIA_S3_REGION
            MEDIA_S3_PUBLIC_BUCKET=$MEDIA_S3_PUBLIC_BUCKET
            MEDIA_S3_ACCESS_KEY_ID=$MEDIA_S3_ACCESS_KEY_ID
            MEDIA_S3_SECRET_ACCESS_KEY=$MEDIA_S3_SECRET_ACCESS_KEY
            EOF

            if [ -n "$GHCR_READ_TOKEN" ]; then
              echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker compose --project-name photo-prjct-production \
              --env-file /opt/photo-prjct/.env \
              -f /opt/photo-prjct/docker-compose.prod.yml pull
            if [ "$ENABLE_HTTPS" = "true" ]; then
              docker volume create photo-prjct-production_letsencrypt >/dev/null
              if ! docker run --rm \
                -v photo-prjct-production_letsencrypt:/etc/letsencrypt \
                alpine:3.21 test -f "/etc/letsencrypt/live/photo-prjct/fullchain.pem"; then
                docker run --rm --network host \
                  -v photo-prjct-production_letsencrypt:/etc/letsencrypt \
                  certbot/certbot:v2.11.0 certonly --standalone --non-interactive --agree-tos \
                  --email "$LETSENCRYPT_EMAIL" --cert-name photo-prjct -d "$PUBLIC_DOMAIN"
              fi
            fi
            docker compose --project-name photo-prjct-production \
              --env-file /opt/photo-prjct/.env \
              -f /opt/photo-prjct/docker-compose.prod.yml up -d --wait
            if [ "$ENABLE_HTTPS" = "true" ]; then
              curl --fail --silent --show-error --retry 6 --retry-delay 5 \
                --resolve "$PUBLIC_DOMAIN:443:127.0.0.1" "https://$PUBLIC_DOMAIN/health/"
            else
              curl --fail --silent --show-error --retry 6 --retry-delay 5 \
                --resolve "$PUBLIC_DOMAIN:80:127.0.0.1" "http://$PUBLIC_DOMAIN/health/"
            fi
            printf '%s\n' "$APP_IMAGE" > /opt/photo-prjct/deployed-image

      - name: Capture production diagnostics on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker compose --project-name photo-prjct-production \
              --env-file /opt/photo-prjct/.env \
              -f /opt/photo-prjct/docker-compose.prod.yml ps || true
            docker compose --project-name photo-prjct-production \
              --env-file /opt/photo-prjct/.env \
              -f /opt/photo-prjct/docker-compose.prod.yml logs --tail=200 || true

{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PicFlow Events</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="{% static 'data.js' %}" defer></script>
    <script src="{% static 'events.js' %}" defer></script>
  </head>
  <body>
    <div class="app-shell admin-shell">
      <header class="topbar">
        <a class="brand" href="{% url 'index' %}" aria-label="PicFlow">
          <span class="brand-mark">PF</span>
          <span>
            <strong>PicFlow</strong>
            <small>events</small>
          </span>
        </a>

        <nav class="admin-nav" aria-label="Разделы">
          <a class="event-tab" href="{% url 'index' %}">Витрина</a>
          <a class="event-tab" href="{% url 'dashboard' %}">Админ панель</a>
          <a class="event-tab active" href="{% url 'events' %}">События</a>
          <a class="event-tab" href="{% url 'upload' %}">Загрузчик</a>
          <a class="event-tab" href="{% url 'orders' %}">Заказы</a>
          <a class="event-tab" href="{% url 'promos' %}">Промокоды</a>
          <a class="event-tab" href="{% url 'purchased' %}">Купленные</a>
        </nav>

        <div class="top-actions" aria-label="Действия">
          <button class="icon-button" id="resetEventsButton" type="button" title="Вернуть демо">
            <i data-lucide="rotate-ccw"></i>
          </button>
        </div>
      </header>

      <main class="events-workspace">
        <section class="events-board" aria-label="События">
          <div class="admin-toolbar">
            <div>
              <h1>События</h1>
              <p id="eventsSummary">0 событий</p>
            </div>
            <button class="primary-button compact-action" id="newEventButton" type="button">
              <i data-lucide="plus"></i>
              Новое событие
            </button>
          </div>

          <div class="input-shell admin-search">
            <i data-lucide="search"></i>
            <input id="eventsSearch" type="search" placeholder="Название или город" autocomplete="off" />
          </div>

          <div class="events-list" id="eventsList" aria-live="polite"></div>
        </section>

        <aside class="event-editor" aria-label="Редактор события">
          <div class="panel-heading">
            <span>Событие</span>
            <span class="pill" id="eventEditorMode">Edit</span>
          </div>

          <form id="eventForm" class="photo-form">
            <label class="field">
              <span>Название</span>
              <input id="eventName" required placeholder="London 10K" />
            </label>

            <label class="field">
              <span>Локация</span>
              <input id="eventLocation" placeholder="London" />
            </label>

            <label class="field">
              <span>Описание</span>
              <textarea id="eventDescription" class="compact-textarea" placeholder="Краткое описание события"></textarea>
            </label>

            <input id="eventCoverFile" type="file" accept="image/*" hidden />
            <label class="cover-upload" for="eventCoverFile">
              <span id="eventCoverPreview"></span>
              <strong>Загрузить обложку</strong>
            </label>

            <div class="form-grid">
              <label class="field">
                <span>Начало</span>
                <input id="eventDateFrom" type="date" />
              </label>
              <label class="field">
                <span>Конец</span>
                <input id="eventDateTo" type="date" />
              </label>
            </div>

            <div class="form-grid">
              <label class="field">
                <span>Цена за фото, ₽</span>
                <input id="eventPriceSingle" type="number" min="0" step="10" placeholder="350" />
              </label>
              <label class="field">
                <span>Цена фотопака, ₽</span>
                <input id="eventPricePack" type="number" min="0" step="50" placeholder="1200" />
              </label>
            </div>

            <input id="eventFrameFile" type="file" accept="image/*" hidden />
            <label class="cover-upload" for="eventFrameFile">
              <span id="eventFramePreview"></span>
              <strong>Загрузить логотип мероприятия</strong>
            </label>
            <button class="secondary-button" id="clearFrameButton" type="button">
              Убрать логотип
            </button>

            <label class="field">
              <span>Локации события</span>
              <input id="eventLocations" placeholder="Старт, Финиш, Трасса 5 км" />
            </label>

            <label class="field">
              <span>Фотографы</span>
              <input id="eventPhotographers" placeholder="Анна Смирнова, Илья Волков" />
            </label>

            <div class="visibility-grid" aria-label="Видимость события">
              <label class="check-row switch-row">
                <input id="eventShowInSearch" type="checkbox" />
                <span>Показывать в поиске</span>
              </label>
              <label class="check-row switch-row">
                <input id="eventShowInResults" type="checkbox" />
                <span>Показывать в выдаче</span>
              </label>
              <label class="check-row switch-row">
                <input id="eventUploadEnabled" type="checkbox" />
                <span>Доступно в загрузчике</span>
              </label>
            </div>

            <div class="event-preview">
              <strong id="eventPreviewName">London 10K</strong>
              <span id="eventPreviewMeta">Активно</span>
            </div>

            <div class="admin-actions two-actions">
              <button class="primary-button" type="submit">
                <i data-lucide="save"></i>
                Сохранить
              </button>
              <button class="danger-button" id="deleteEventButton" type="button">
                <i data-lucide="trash-2"></i>
                Удалить
              </button>
            </div>
          </form>
        </aside>
      </main>

      <div class="toast" id="eventsToast" role="status" aria-live="polite" hidden></div>
    </div>
  </body>
</html>

{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PicFlow Admin</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js" defer></script>
    <script src="{% static 'data.js' %}" defer></script>
    <script src="{% static 'admin.js' %}" defer></script>
  </head>
  <body>
    <div class="app-shell admin-shell">
      <header class="topbar">
        <a class="brand" href="{% url 'index' %}" aria-label="PicFlow">
          <span class="brand-mark">PF</span>
          <span>
            <strong>PicFlow</strong>
            <small>admin</small>
          </span>
        </a>

        <nav class="admin-nav" aria-label="Разделы">
          <a class="event-tab" href="{% url 'index' %}">Витрина</a>
          <a class="event-tab active" href="{% url 'dashboard' %}">Админ панель</a>
          <a class="event-tab" href="{% url 'events' %}">События</a>
          <a class="event-tab" href="{% url 'upload' %}">Загрузчик</a>
          <a class="event-tab" href="{% url 'orders' %}">Заказы</a>
          <a class="event-tab" href="{% url 'promos' %}">Промокоды</a>
          <a class="event-tab" href="{% url 'purchased' %}">Купленные</a>
        </nav>

        <div class="top-actions" aria-label="Действия">
          <button class="icon-button" id="importButton" type="button" title="Импорт">
            <i data-lucide="upload"></i>
          </button>
          <button class="icon-button" id="exportButton" type="button" title="Экспорт">
            <i data-lucide="download"></i>
          </button>
        </div>
      </header>

      <main class="admin-workspace">
        <section class="admin-board" aria-label="Фото">
          <div class="admin-toolbar">
            <div>
              <button class="ghost-button back-events" id="adminBackEvents" type="button" hidden>
                <i data-lucide="arrow-left"></i>
                Все события
              </button>
              <h1 id="adminTitle">События</h1>
              <p id="adminSummary">0 фото</p>
            </div>
            <button class="primary-button compact-action" id="newPhotoButton" type="button">
              <i data-lucide="plus"></i>
              Новое фото
            </button>
          </div>

          <div class="input-shell admin-search">
            <i data-lucide="search"></i>
            <input id="adminSearch" type="search" placeholder="ID, мероприятие, номер или человек" autocomplete="off" />
          </div>

          <div class="admin-list" id="adminList" aria-live="polite"></div>
        </section>

        <aside class="admin-editor" aria-label="Редактор">
          <div class="panel-heading">
            <span>Карточка фото</span>
            <span class="pill" id="editorMode">Edit</span>
          </div>

          <div class="editor-empty" id="adminEditorEmpty">
            <i data-lucide="calendar-search"></i>
            <strong>Выберите событие</strong>
            <span>После выбора события откроется список фотографий.</span>
          </div>

          <form id="photoForm" class="photo-form" hidden>
            <label class="field">
              <span>ID фото</span>
              <input id="photoId" name="id" required placeholder="LDN-1048" />
            </label>

            <input id="photoImageFile" type="file" accept="image/*" hidden />
            <label class="cover-upload" for="photoImageFile">
              <span id="photoImagePreview"></span>
              <strong>Загрузить фото</strong>
            </label>

            <label class="field">
              <span>Мероприятие</span>
              <select id="photoEvent" name="event" required></select>
            </label>

            <div class="form-grid">
              <label class="field">
                <span>Дата съёмки</span>
                <input id="photoDate" name="date" type="date" required />
              </label>
              <label class="field">
                <span>Время съёмки</span>
                <input id="photoTime" name="time" type="time" step="1" required />
              </label>
            </div>

            <label class="field">
              <span>Локация</span>
              <select id="photoZone" name="zone"></select>
            </label>

            <label class="field">
              <span>Фотограф</span>
              <input id="photoPhotographer" placeholder="Анна Смирнова" />
            </label>

            <label class="field">
              <span>Номера участников</span>
              <input id="photoBibs" name="bibs" placeholder="1842, 921" />
            </label>

            <label class="field">
              <span>Добавить к номеру или человеку</span>
              <input id="photoManualPacks" placeholder="1842, Иван Петров" />
            </label>

            <label class="check-row switch-row">
              <input id="photoHidden" type="checkbox" />
              <span>Скрыть фото из выдачи</span>
            </label>

            <div class="editor-preview" id="editorPreview"></div>

            <div class="admin-actions">
              <button class="primary-button" type="submit">
                <i data-lucide="save"></i>
                Сохранить
              </button>
              <button class="secondary-button" id="duplicateButton" type="button">
                <i data-lucide="copy"></i>
                Дубль
              </button>
              <button class="danger-button" id="deleteButton" type="button">
                <i data-lucide="trash-2"></i>
                Удалить
              </button>
            </div>

            <button class="ghost-button reset-data" id="resetDataButton" type="button">
              <i data-lucide="rotate-ccw"></i>
              Вернуть демо-данные
            </button>
          </form>
        </aside>
      </main>

      <input id="importFile" type="file" accept="application/json" hidden />
      <div class="toast" id="adminToast" role="status" aria-live="polite" hidden></div>
    </div>
  </body>
</html>
